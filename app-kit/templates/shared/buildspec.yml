version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - npm ci
  build:
    commands:
      - npm run build
  post_build:
    commands:
      - aws s3 sync {{BUILD_OUTPUT_DIR}}/ s3://$BUCKET_NAME/ --delete --exclude index.html --cache-control "public,max-age=31536000,immutable"
      - aws s3 cp {{BUILD_OUTPUT_DIR}}/index.html s3://$BUCKET_NAME/index.html --cache-control "public,max-age=60,must-revalidate" --content-type "text/html"
      - aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"

artifacts:
  base-directory: {{BUILD_OUTPUT_DIR}}
  files:
    - "**/*"
